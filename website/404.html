<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/app-icon.png" />
    <link rel="stylesheet" href="/styles.css" />
    <title>页面未找到 - 轻拍图片设计</title>
    <style>
      .not-found {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      .not-found img {
        width: 72px;
        margin: 0 auto 24px;
        border-radius: 8px;
      }
      .not-found h1 {
        margin: 0;
        font: 700 clamp(40px, 8vw, 80px) / 1 "STSong", "SimSun", serif;
      }
      .not-found p {
        margin: 16px 0 28px;
        color: var(--ink-soft);
      }
      .not-found .button-primary {
        color: var(--paper-strong);
        background: var(--ink);
      }
    </style>
  </head>
  <body>
    <main class="not-found">
      <div>
        <img src="/assets/app-icon.png" alt="轻拍图标" />
        <h1>页面未找到</h1>
        <p>这个地址暂时没有内容，请返回轻拍图片设计首页。</p>
        <a class="button button-primary" href="/index.html">返回首页</a>
      </div>
    </main>
  </body>
</html>
